<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIPS-login</title>
      <script src="https://kit.fontawesome.com/41d51bfab0.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="login.css">
</head>
<body>

  <header>
    <img src="CRIG-LOGO1.png" alt="logo">
    <h3>CRIPS MS</h3>
  </header>

  <div class="form-login">
    <h3>Login</h3>
    <p class="welcome-text">Welcome To CRIPS MS!</p>
    <p class="login-text-direction">Enter email and password to login.</p>

    <form  id="login-form">
      <div class="form-group">
        <label for="user_name">Email</label>
        <div class="form-input-img">
          <i class="fa-solid fa-user"></i>
          <input type="email" id="user_name">
        </div>
      </div>

       <div class="form-group">
        <label for="password">Password</label>
        <div class="form-input-img">
          <i class="fa-solid fa-lock"></i>
          <input type="password"  id="user_password">

           <div class="right">
      <i class="fa-solid fa-eye"  id="toggle-password"></i>
    </div>
        </div>
      </div>
`
      <button class="submit-btn" type="submit" id="login-submit-btn">Sign In</button>

      <p class="forgot-text">If forgotten password, contact admin.</p>

    </form>
  </div>

    <div class="success-message-show" id="success-show">
      
    </div>

    <div class="error-message-show" id="error-show">
     
    </div>


    <p class="developer-text">Powered by: McCode Networks (mccodenetworks@gmail.com)</p>

                 

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>     
 <script src="../data/supabase.js" defer></script>

</html>
